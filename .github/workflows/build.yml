name: Build and deploy Toxser Censor

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: toxsercensor-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: toxsercensor-jar
          path: build/libs/toxsercensor-*.jar
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to Minecraft server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: toxsercensor-jar
          path: dist

      - name: Configure SSH
        env:
          MC_SERVER_HOST: ${{ secrets.MC_SERVER_HOST }}
          MC_SERVER_SSH_KEY: ${{ secrets.MC_SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$MC_SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$MC_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload jar and restart server
        env:
          MC_SERVER_HOST: ${{ secrets.MC_SERVER_HOST }}
          MC_SERVER_USER: ${{ secrets.MC_SERVER_USER }}
          SERVER_DIR: /home/minecraft/server
          MOD_NAME: toxsercensor-1.0.0.jar
        run: |
          set -euo pipefail
          jar_path="$(find dist -maxdepth 1 -name 'toxsercensor-*.jar' ! -name '*-sources.jar' | head -n 1)"
          test -n "$jar_path"

          scp "$jar_path" "$MC_SERVER_USER@$MC_SERVER_HOST:$SERVER_DIR/mods/$MOD_NAME.new"

          ssh "$MC_SERVER_USER@$MC_SERVER_HOST" "SERVER_DIR='$SERVER_DIR' MOD_NAME='$MOD_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$SERVER_DIR"

          ts="$(date +%Y%m%d-%H%M%S)"
          mkdir -p mods_backup
          if [ -f "mods/$MOD_NAME" ]; then
            cp "mods/$MOD_NAME" "mods_backup/$MOD_NAME.$ts"
          fi

          mv "mods/$MOD_NAME.new" "mods/$MOD_NAME"

          pid="$(pgrep -f 'java.*fabric-server-launch.jar' | head -n 1 || true)"
          if [ -n "$pid" ]; then
            kill "$pid"
          fi
          REMOTE

      - name: Verify server restarted and mod is visible in logs
        env:
          MC_SERVER_HOST: ${{ secrets.MC_SERVER_HOST }}
          MC_SERVER_USER: ${{ secrets.MC_SERVER_USER }}
        run: |
          set -euo pipefail
          sleep 20
          ssh "$MC_SERVER_USER@$MC_SERVER_HOST" "pgrep -af 'java.*fabric-server-launch.jar' && grep -i 'toxsercensor' /home/minecraft/server/logs/latest.log | tail -5"
