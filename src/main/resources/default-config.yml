# ToxserCensor configuration
# YAML format — supports comments!
# After editing, run /toxsercensor reload to apply changes
# ---

# ---- banwords: полные слова ----
# Маскируются целиком (***). Работают по границам слова.
# Пример: "лох" -> ***, но "блохастый" -> "блохастый" (не маскируется)
banwords:
  - лох
  - дурак
  - идиот
  - идиотка
  - дебил
  - дебилка
  - даун
  - кретин
  - кретинка
  - придурок
  - пидор
  - пидорас
  - педик
  - педераст
  - гомосек
  - гомосексуалист
  - извращенец
  - онанист
  - дрочер
  - шлюха
  - шалава
  - проститутка
  - сука
  - сучка
  - блядь
  - блядина
  - мразь
  - тварь
  - сволочь
  - урод
  - уродина
  - гнида
  - гад
  - гадина
  - подонок
  - ублюдок
  - выродок
  - мудозвон
  - мудак
  - мудила
  - мудило
  - козёл
  - козлина
  - козел
  - баран
  - чепушило
  - чмо
  - ничтожество
  - петух
  - обиженка

# ---- partialWords: частичная маскировка ----
# Первая и последняя буквы видны, остальное ***.
partialWords: []

# ---- roots: корни слов ----
# Маскируют всю производную от корня.
# Корень проверяется по левой границе слова.
# "хуй" -> "хуйня", "хуйнуть" (маскируются), но "мухуй" -> "мухуй" (нет)
# Слова со спецсимволами оборачивать в кавычки.
roots:
  - хуй
  - пизд
  - еб
  - бля
  - бляд
  - говн
  - мудак
  - мудил
  - залуп
  - долбоеб
  - сран
  - срач
  - нах
  - похуй
  - оху
  - хер
  - суч
  - гнид
  - урод
  - твар
  - шлюх
  - мраз
  - подон
  - извращ
  - дроч
  - онан
  - пед
  - гомо

# ---- regexRoots: регулярные выражения ----
# Дополнительные шаблоны для гибкой фильтрации.
# Применяются до обычных корней. Регистронезависимые.
# Оборачивать в кавычки если есть спецсимволы.
# Пример: "(н|нн)ах(у|ю)й" — ловит "нахуй", "ннахуй", "нахюй"
regexRoots:
  - "\\b[бb][лl][яa][дdtь?]+"   # блядь с вариациями
  - "(н|нн)ах(у|ю)й"           # нахуй варианты

# ---- whitelist: исключения ----
# UUID игроков (lowercase), чьи сообщения НЕ фильтруются.
# Команда: /toxsercensor whitelist add <uuid>
whitelist: []

# ---- autoMute: авто-мут нарушителей ----
# При N нарушениях за M минут -> временный мут (kick с сообщением).
autoMute:
  enabled: false
  maxViolations: 3
  windowMinutes: 5
  muteDurationMinutes: 10
